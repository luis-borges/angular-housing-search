<label class="label-text" for="location-search">Search for a new place</label>
<input
  id="location-search"
  #search
  placeholder="Search by city or housing name"
  (input)="searchHousingLocations(search.value)"
/><button (click)="searchHousingLocations(search.value)">Search</button>
<article
  *ngFor="let location of results"
  (click)="selectHousingLocation(location)"
>
  <img [src]="location.photo" [alt]="location.name" />
  <p>{{ location.name }}</p>
  <p>{{ location.city }}, {{ location.state }}</p>
  <button (click)="selectHousingLocation(location)">View</button>
</article>
